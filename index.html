<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

    <!-- SEO & Meta — warm brand palette, not dark -->
    <title>RedPiston — Automotive Parts ERP & Marketplace</title>
    <meta name="description" content="RedPiston: India's premium automotive parts management system. Inventory, POS billing, marketplace, workshop, and analytics for auto parts businesses." />
    <meta name="theme-color" content="#8B1E1E" />
    <!-- light color-scheme — ERP uses warm cream palette, not dark -->
    <meta name="color-scheme" content="light" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.redpiston.in/" />

    <!-- Open Graph -->
    <meta property="og:title" content="RedPiston — Automotive Parts ERP & Marketplace" />
    <meta property="og:description" content="Precision tools for the modern auto parts business. Inventory, POS, workshop, and marketplace in one platform." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.redpiston.in/" />
    <meta property="og:image" content="https://www.redpiston.in/logo.png" />
    <meta property="og:site_name" content="RedPiston" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="RedPiston — Automotive Parts ERP & Marketplace" />
    <meta name="twitter:description" content="India's premium automotive parts management system. Inventory, POS billing, marketplace, workshop, and analytics." />
    <meta name="twitter:image" content="https://www.redpiston.in/logo.png" />

    <!-- Search -->
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="auto parts ERP, automotive parts inventory, spare parts management India, auto parts marketplace, vehicle parts billing software" />

    <!-- Favicon — same PNG used in the app header -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      FONT STRATEGY — Automotive ERP ("Premium Industrial"):
      · Rajdhani    → Automotive headings, page titles, KPI numbers (racing/precision feel)
      · Poppins     → Brand name, section headers (geometric, modern)
      · Inter       → All UI labels, body, table data, form fields (systematic, legible at density)
      · JetBrains Mono → Prices, codes, stock numbers (monospaced precision)
      · Material Symbols Outlined → Icon set (loaded on its own link, see note below)
    -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    </noscript>

    <!--
      Material Symbols is a LIGATURE font: the DOM text is the literal icon
      name ("dashboard", "point_of_sale"...) and the font is what turns it
      into a glyph. display=swap (correct for real text) is wrong here —
      the "fallback" IS the raw icon name, so a slow/cold load flashes
      readable garbage text in the sidebar. Load it with display=block (glyph
      area stays blank instead of showing text) AND keep it invisible via
      .icon-font-loading until the Font Loading API confirms it's ready, so
      there's no flash even if the font takes longer than the browser's
      built-in block period.
    -->
    <style>.icon-font-loading .material-symbols-outlined { visibility: hidden; }</style>
    <script>
      document.documentElement.classList.add('icon-font-loading');
      window.__revealIcons = function () {
        var reveal = function () { document.documentElement.classList.remove('icon-font-loading'); };
        if (window.document.fonts && document.fonts.ready) {
          document.fonts.ready.then(reveal).catch(reveal);
        } else {
          reveal();
        }
        // Safety cap — never leave icons invisible if font loading stalls/fails.
        setTimeout(reveal, 3000);
      };
    </script>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      media="print" onload="this.media='all'; window.__revealIcons()" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
