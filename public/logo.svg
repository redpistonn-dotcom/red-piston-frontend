<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 10 104 105" fill="none">
  <!-- C-shaped gear ring with teeth -->
  <g transform="translate(60,62)">
    <!-- Outer gear teeth (C-shape, open at bottom-right) -->
    <path d="
      M0,-52 L6,-50 L10,-44 L14,-48 L19,-42 L15,-38
      L20,-32 L14,-30 L14,-22 L20,-20 L19,-13 L14,-15
      L10,-8 L14,-3 L10,5 L6,2
      L0,8 L-6,2 L-10,5 L-14,-3
      L-10,-8 L-14,-15 L-19,-13 L-20,-20
      L-14,-22 L-14,-30 L-20,-32 L-15,-38
      L-19,-42 L-14,-48 L-10,-44 L-6,-50 Z
    " fill="#8B1A0F" stroke="#6B1008" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Inner bore -->
    <circle cx="0" cy="-22" r="18" fill="#F5EFE6"/>
    <circle cx="0" cy="-22" r="18" fill="none" stroke="#6B1008" stroke-width="2"/>
    <!-- Hub -->
    <circle cx="0" cy="-22" r="6" fill="#8B1A0F"/>

    <!-- Piston rod diagonal -->
    <rect x="-48" y="-5" width="96" height="12" rx="5" fill="#BE2B1A" transform="rotate(-40 0 0) translate(0,14)"/>

    <!-- Piston crown (right end) -->
    <rect x="18" y="-38" width="16" height="22" rx="3" fill="#BE2B1A"/>
    <rect x="15" y="-34" width="22" height="4" rx="1" fill="#9B1F12"/>
    <rect x="15" y="-26" width="22" height="4" rx="1" fill="#9B1F12"/>

    <!-- Connecting rod pin -->
    <circle cx="-8" cy="16" r="5" fill="#F5EFE6" stroke="#8B1A0F" stroke-width="1.5"/>

    <!-- Diamond lozenge (lower-left) -->
    <path d="M-44,30 L-38,22 L-32,30 L-38,38 Z" fill="#BE2B1A" stroke="#9B1F12" stroke-width="0.5"/>
    <circle cx="-38" cy="30" r="3" fill="#F5EFE6" stroke="#8B1A0F" stroke-width="1"/>
  </g>
</svg>
